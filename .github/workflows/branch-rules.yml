name: Enforce Branching Strategy

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  enforce-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR to main
        if: github.base_ref == 'main'
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "::error::PRs to main are only allowed from the 'dev' branch."
            exit 1
          fi

      - name: Check PR to dev
        if: github.base_ref == 'dev'
        run: |
          if ! git rev-parse --verify origin/main >/dev/null 2>&1; then
            echo "main branch does not exist yet. Allowing PR."
            exit 0
          fi

          if ! git rev-parse --verify origin/dev >/dev/null 2>&1; then
            echo "dev branch does not exist yet. Allowing PR."
            exit 0
          fi

          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          BASE_WITH_MAIN=$(git merge-base origin/main $HEAD_SHA)
          BASE_WITH_DEV=$(git merge-base origin/dev $HEAD_SHA)

          MAIN_SHA=$(git rev-parse origin/main)
          DEV_SHA=$(git rev-parse origin/dev)

          echo "Main SHA: $MAIN_SHA"
          echo "Dev SHA: $DEV_SHA"
          echo "Merge base with Main: $BASE_WITH_MAIN"
          echo "Merge base with Dev: $BASE_WITH_DEV"

          if [ "$MAIN_SHA" = "$DEV_SHA" ]; then
            echo "main and dev branches are at the same commit. Branch origin is ambiguous but valid."
            exit 0
          fi

          if [ "$BASE_WITH_MAIN" = "$BASE_WITH_DEV" ]; then
            echo "::error::The branch for this PR was created from 'main' instead of 'dev'. New task branches must be created from 'dev'."
            exit 1
          fi

          echo "Branch appears to be correctly based on 'dev'."
          exit 0
