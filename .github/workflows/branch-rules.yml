name: Enforce Branching Strategy

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  enforce-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR to main
        if: github.base_ref == 'main'
        run: |
          if [[ "${{ github.head_ref }}" != "dev" && "${{ github.head_ref }}" != dev-* ]]; then
            echo "::error::PRs to main are only allowed from the 'dev' branch (or branches starting with 'dev-')."
            exit 1
          fi

      - name: Check PR to dev
        if: github.base_ref == 'dev'
        run: |
          if [ "${{ github.head_ref }}" = "main" ]; then
            echo "PR from main to dev is allowed for syncing."
            exit 0
          fi

          if [[ "${{ github.head_ref }}" == hotfix/* ]]; then
            echo "PR from hotfix branch to dev is allowed."
            exit 0
          fi

          if ! git rev-parse --verify origin/main >/dev/null 2>&1; then
            echo "main branch does not exist yet. Allowing PR."
            exit 0
          fi

          if ! git rev-parse --verify origin/dev >/dev/null 2>&1; then
            echo "dev branch does not exist yet. Allowing PR."
            exit 0
          fi

          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          BASE_WITH_MAIN=$(git merge-base origin/main $HEAD_SHA)

          if git merge-base --is-ancestor $BASE_WITH_MAIN origin/dev; then
            echo "Branch appears to be correctly based on 'dev' (or a common ancestor of main and dev)."
            exit 0
          else
            echo "::error::The branch for this PR contains commits from 'main' that are not in 'dev'. This indicates it was branched from 'main' instead of 'dev'. New task branches must be created from 'dev'."
            exit 1
          fi
